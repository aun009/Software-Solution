<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP Tech Solutions | Software Showcase</title>
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <!-- Preload critical logo so navbar renders without flicker -->
    <link rel="preload" href="/logo.jpeg" as="image" type="image/jpeg" />
    <!-- DNS prefetch external image domains to reduce first-byte latency -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://img.logo.dev" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { background-color: #050505; color: white; margin: 0; }
      #root:empty::after {
        content: 'Loading SP Tech Solutions...';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: sans-serif;
        font-weight: bold;
        opacity: 0.5;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
